<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>랭킹 보기 | Plan9 Text Battle MVP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body data-page="rank">
  <div class="page-shell">
    <div id="siteHeader"></div>

    <header class="page-title">
      <p class="eyebrow">RANKING</p>
      <h1>캐릭터 랭킹</h1>
      <p>승리 수 기준으로 캐릭터를 정렬하고, 승률과 전적을 함께 보여줍니다.</p>
    </header>

    <main class="page-card card">
      <div class="page-header">
        <div>
          <p class="section-header__eyebrow">LEADERBOARD</p>
          <h2>전체 랭킹</h2>
        </div>
      </div>

      <div id="rankMessage"></div>
      <div id="rankLoading" class="status-banner status-banner--info">랭킹을 불러오는 중입니다.</div>
      <section id="rankList" class="character-grid" aria-live="polite"></section>
    </main>
  </div>

  <div id="globalError" class="global-error" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="./supabase.js"></script>
  <script defer src="./app.js"></script>
  <script defer src="./rank.js"></script>
</body>
</html>
